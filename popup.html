<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Truth Social 日本語化</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 16px; width: 320px; color: #111827; background: #fff; }
    h1 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 12px; line-height: 1.55; color: #4b5563; margin: 0 0 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 12px 0 10px; }
    .status { font-size: 12px; color: #374151; margin: 8px 0 12px; }
    .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
    .switch input { display: none; }
    .slider { position: absolute; inset: 0; cursor: pointer; background: #d1d5db; transition: .2s; border-radius: 999px; }
    .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; top: 3px; background: white; transition: .2s; border-radius: 999px; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
    input:checked + .slider { background: #2563eb; }
    input:checked + .slider:before { transform: translateX(22px); }
    button { appearance: none; border: 1px solid #d1d5db; background: #fff; color: #111827; border-radius: 10px; padding: 10px 12px; font-size: 12px; cursor: pointer; width: 100%; }
    button:hover { background: #f9fafb; }
    .muted { font-size: 11px; color: #6b7280; line-height: 1.45; }
  </style>
</head>
<body>
  <h1>Truth Social 日本語化 + 手動翻訳</h1>
  <p>辞書翻訳機能とAPIを用いた翻訳</p>

  <div class="row">
    <span>拡張を有効にする</span>
    <label class="switch">
      <input id="toggleEnabled" type="checkbox">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span>翻訳ボタンを表示</span>
    <label class="switch">
      <input id="togglePosts" type="checkbox">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="status">読み込み中…</div>
  <button id="openOptions">API設定・辞書編集を開く</button>
  <p class="muted" style="margin-top:10px;">
    デフォルトでは投稿は翻訳しません。<br>
    各投稿の下部ボタンを押すと翻訳されます。
  </p>

  <script src="popup.js"></script>
</body>
</html>
